html,body{height:100%;background:var(--bg);color:var(--g);font-family:'Courier New',monospace;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:999}

/* BOOT */

.bl{font-size:13px;color:var(--gd);opacity:0;transition:opacity .3s;letter-spacing:1px}

#bwrap{width:300px;height:3px;background:#1a2a1a;margin-top:14px;overflow:hidden;opacity:0;transition:opacity .3s}
#bbar{height:100%;width:0%;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .05s linear}

/* GLITCH */
@keyframes glitch1{0%,100%{clip-path:inset(0 0 98% 0);transform:translate(-4px,0)}50%{clip-path:inset(0 0 90% 0);transform:translate(4px,0)}}
@keyframes glitch2{0%,100%{clip-path:inset(60% 0 0 0);transform:translate(4px,0)}50%{clip-path:inset(70% 0 0 0);transform:translate(-4px,0)}}
.glitch-wrap{position:relative;display:inline-block}
.glitch-wrap::before,.glitch-wrap::after{content:attr(data-text);position:absolute;top:0;left:0;font-size:52px;color:var(--g);letter-spacing:10px;font-weight:bold;opacity:0}
.glitch-wrap.go::before{animation:glitch1 .15s steps(2) forwards;opacity:1;color:#ff3b3b;text-shadow:none}
.glitch-wrap.go::after{animation:glitch2 .15s steps(2) forwards;opacity:1;color:#00e5ff;text-shadow:none}

/* TERM */
#term{width:100%;height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .5s}
#titlebar{display:flex;align-items:center;justify-content:space-between;background:#111811;border-bottom:1px solid var(--gd);padding:6px 16px;flex-shrink:0;z-index:10}
.dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
#out{flex:1;overflow-y:auto;padding:20px 24px 10px;scrollbar-width:thin;scrollbar-color:var(--gd) var(--bg)}
#out::-webkit-scrollbar{width:4px}
#out::-webkit-scrollbar-thumb{background:var(--gd)}
.ln{line-height:1.65;font-size:14px;white-space:pre;font-family:'Courier New',monospace;animation:fi .12s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.gap{height:8px}
.header{color:var(--am);letter-spacing:3px;font-weight:bold}
.info{color:var(--wh)}
.accent{color:var(--cy)}
.error{color:var(--rd)}
.success{color:var(--g)}
.dim{color:var(--gd)}
.cmd{color:var(--wh)}
.art{color:var(--g);font-size:13px}
.echo{color:var(--gd)}

/* WHOAMI LAYOUT */
.whoami-block{display:flex;gap:24px;align-items:flex-start;padding:4px 0;animation:fi .12s ease}
.whoami-photo{flex-shrink:0;border:1px solid var(--gd);padding:3px;box-shadow:0 0 10px var(--gd);position:relative}
.whoami-photo::before{content:'[img]';position:absolute;top:-18px;left:0;font-size:11px;color:var(--gd);letter-spacing:1px}
.whoami-photo img{display:block;width:130px;height:130px;object-fit:cover;filter:grayscale(40%) contrast(1.1);opacity:.9}
.whoami-photo::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,0.04) 3px,rgba(0,255,65,0.04) 4px);pointer-events:none}
.whoami-text{display:flex;flex-direction:column;gap:2px;padding-top:4px}
.whoami-text .wl{font-family:'Courier New',monospace;font-size:14px;line-height:1.65;white-space:pre}

/* INPUT */

#ci{flex:1;background:transparent;border:none;outline:none;color:var(--wh);font-family:'Courier New',monospace;font-size:14px;caret-color:var(--g)}

/* HINT */
#hint{position:fixed;bottom:60px;right:24px;color:var(--gd);font-size:12px;opacity:0;transition:opacity 1s;pointer-events:none;z-index:20;letter-spacing:1px}

/* MOBILE KB */

</style>

// ── RENDER ────────────────────────────────────────────────────────────────────
function addLine(l,delay){
  return new Promise(function(res){
    setTimeout(function(){
      if(l.t==='gap'){var d=document.createElement('div');d.style.height='8px';out.appendChild(d);}
      else{var d=document.createElement('div');d.className='ln '+l.t;d.textContent=l.v||'';out.appendChild(d);}
      out.scrollTop=out.scrollHeight;res();
    },delay||0);
  });
}

function printLines(lines,delay){
  lines.forEach(function(l,i){addLine(l,i*(delay||0));});
}

      // type these out char by char
      var d=document.createElement('div');
      d.className='ln '+(l.t||'info');
      out.appendChild(d);
      out.scrollTop=out.scrollHeight;
      var chars=l.v.split(''),ci2=0;
      var iv=setInterval(function(){
        d.textContent+=chars[ci2++];
        out.scrollTop=out.scrollHeight;
        if(ci2>=chars.length){clearInterval(iv);setTimeout(next,40);}
      },l.t==='art'?8:18);
    } else {
      addLine(l,0).then(function(){setTimeout(next,30);});
    }
  }
  next();
}

function handleCmd(raw){
  var cmd=raw.trim().toLowerCase();
  if(!cmd)return;
  resetHintTimer();
  var d=document.createElement('div');
  d.className='ln echo';
  d.textContent='ziyad@portfolio:~$ '+raw.trim();
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;

  if(cmd==='clear'){setTimeout(function(){out.innerHTML='';},50);return;}
  if(cmd==='ping ziyad'||cmd==='ping'){doPing();return;}
  if(cmd==='cat resume.pdf'){doResume();return;}
  if(cmd==='whoami'){renderWhoami();return;}

  var res=DATA[cmd]||EASTER[cmd];
  if(res){printLines(res,20);}
  else{
    printLines([
      {t:'error',v:'  bash: '+cmd+': command not found'},
      {t:'dim',  v:"  type 'help' for available commands"},
      {t:'gap'}
    ],0);
  }
}

// ── TAB AUTOCOMPLETE ──────────────────────────────────────────────────────────
ci.addEventListener('keydown',function(e){
  if(e.key==='Tab'){
    e.preventDefault();
    var val=ci.value.toLowerCase();
    if(!val)return;
    var match=CMDS_LIST.filter(function(c){return c.startsWith(val);});
    if(match.length===1){ci.value=match[0];}
    else if(match.length>1){
      printLines([{t:'dim',v:'  '+match.join('  ')},{t:'gap'}],0);
    }
    return;
  }
  if(e.key==='Enter'){
    var v=ci.value;ci.value='';hi=-1;
    if(v.trim())hist.unshift(v.trim());
    if(!hasTyped){hasTyped=true;clearTimeout(hintTimer);hint.style.opacity=0;}
    handleCmd(v);
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(hi<hist.length-1)hi++;
    ci.value=hist[hi]||'';
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(hi>0)hi--;else{hi=-1;ci.value='';return;}
    ci.value=hist[hi]||'';
  }
});

document.addEventListener('click',function(){ci.focus();});

function quickCmd(cmd){ci.value=cmd;ci.focus();}

// ── HINT TIMER ────────────────────────────────────────────────────────────────
function resetHintTimer(){
  clearTimeout(hintTimer);
  hint.style.opacity=0;
  if(!hasTyped){
    hintTimer=setTimeout(function(){hint.style.opacity=1;},5000);
  }
}

  var el=document.getElementById('bt');
  if(!el)return;
  el.classList.add('go');

}
